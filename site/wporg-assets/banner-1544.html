<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Nunito:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#0a0a0b; --fg:#f4f4f5; --muted:#a1a1aa; --accent:#8b93ff; --ok:#34d399; --warn:#f0a35e; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 1544px; height: 500px; }
  .banner {
    width: 1544px; height: 500px; position: relative; overflow: hidden; background: var(--ink);
    font-family: "Nunito", system-ui, sans-serif; color: var(--fg);
  }
  .banner::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(48% 90% at 88% 12%, rgba(139,147,255,0.34), transparent 70%),
      radial-gradient(40% 70% at 4% 96%, rgba(52,211,153,0.08), transparent 70%);
  }
  .left { position: absolute; left: 96px; top: 92px; width: 900px; z-index: 2; }
  .logo { display: flex; align-items: center; gap: 14px; margin-bottom: 30px; }
  .circle { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(150deg,#edeef4,#c5c5cf);
    display: grid; place-items: center; box-shadow: 0 8px 22px -8px rgba(0,0,0,0.7); }
  .circle span { font-family: system-ui, "Segoe UI Symbol", sans-serif; font-size: 30px; color: #0a0a0b; }
  .wordmark { font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: 30px; letter-spacing: -0.02em; }
  h1 { font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 62px; line-height: 1.04;
    letter-spacing: -0.035em; margin: 0 0 22px; }
  h1 .strike { position: relative; white-space: nowrap; color: var(--muted); }
  h1 .strike::after { content: ""; position: absolute; left: -1%; right: -1%; top: 55%; height: 5px; border-radius: 3px;
    background: var(--warn); transform: rotate(-2deg); box-shadow: 0 0 16px -2px var(--warn); }
  .sub { font-size: 23px; line-height: 1.5; color: var(--muted); max-width: 660px; }
  .sub b { color: var(--fg); font-weight: 600; }

  /* faded chat motif, right */
  .motif { position: absolute; right: 70px; top: 96px; width: 470px; z-index: 1; opacity: 0.9;
    transform: rotate(2.5deg); }
  .bubble { margin-left: auto; width: fit-content; max-width: 100%; background: var(--accent); color: #0a0a0b;
    font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 19px; padding: 15px 19px;
    border-radius: 18px 18px 5px 18px; box-shadow: 0 30px 60px -24px rgba(0,0,0,0.8); }
  .chip-row { display: flex; gap: 12px; margin-top: 22px; }
  .chip { flex: 1; text-align: center; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 18px; font-family: "Nunito",sans-serif; }
  .chip.yes { background: var(--ok); color: #06231a; }
  .chip.no { background: rgba(244,244,245,0.08); color: var(--muted); }
</style>
</head>
<body>
  <div class="banner">
    <div class="motif">
      <div class="bubble">mark order 2833 as used</div>
      <div class="chip-row"><div class="chip yes">Confirm</div><div class="chip no">Cancel</div></div>
    </div>
    <div class="left">
      <div class="logo"><span class="circle"><span>❡</span></span><span class="wordmark">WPChat</span></div>
      <h1>Stop being your clients'<br />WordPress <span class="strike">helpdesk</span>.</h1>
      <p class="sub">Your clients manage their own WooCommerce store &amp; content <b>by chat</b> — in any language, with a confirm step so nothing breaks. <b>Free &amp; open source.</b></p>
    </div>
  </div>
</body>
</html>
