name: Release

# Publish a GitHub Release (tag + notes + plugin ZIP asset) when the version
# in chat-admin.php has no matching release yet. Runs bin/release.sh --publish
# on a GitHub-hosted runner (which has the gh CLI and a contents:write token),
# so releases are cut from the repo itself — no local gh install or tag push.
#
# Idempotent: it checks for an existing release FIRST and skips the build
# entirely when the current version is already released, so ordinary pushes to
# main are a fast no-op and only a version bump actually publishes. The Plugin
# Update Checker on every site reads the attached ZIP asset.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Package + publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Has this version already been released?
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(grep -m1 -E '^\s*\*\s*Version:' chat-admin.php | sed -E 's/.*Version:[[:space:]]*//; s/[[:space:]]*$//')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release v$VERSION already exists — nothing to publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::v$VERSION not released yet — will build and publish."
          fi

      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.exists == 'false'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'false'
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      # bin/release.sh asserts version consistency, rebuilds and checks the
      # committed build/, packages a clean chat-admin-vX.Y.Z.zip via git archive,
      # then creates the tag + GitHub Release and uploads the ZIP asset.
      - name: Build, package, and publish the release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bin/release.sh --publish
